services:
  mysql:
    image: mysql:8
    container_name: mysql-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}

    ports:
      - "${MYSQL_PORT}:3306"

    volumes:
      - mysql-data:/var/lib/mysql

    networks:
      - dockerops-network

    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot123"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  adminer:
    image: adminer
    container_name: adminer
    restart: unless-stopped

    ports:
      - "${ADMINER_PORT}:8080"

    networks:
      - dockerops-network

    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql-data:

networks:
  dockerops-network:
